name: Pages Schemas

on:
  push:
    branches: ["main"]
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: pages
  cancel-in-progress: true

jobs:
  build-pages:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2

      - uses: actions/setup-node@53b83947a5a98c8d113130e565377fae1a50d02f # v6.3.0
        with:
          node-version: '22.20.0'

      - name: Collect schemas
        run: node common/scripts/collect-schemas.js

      - name: Collect tool documentation
        run: |
          # Copy tool docs into content site
          mkdir -p content/src/tools/znelchar/docs
          cp -r tools/znelchar/docs/* content/src/tools/znelchar/docs/ 2>/dev/null || true
          
          # Add any additional tools following the same pattern
          for tool_dir in tools/*/docs; do
            if [ -d "$tool_dir" ]; then
              tool_name=$(basename $(dirname "$tool_dir"))
              mkdir -p "content/src/tools/$tool_name"
              cp -r "$tool_dir" "content/src/tools/$tool_name/" 2>/dev/null || true
            fi
          done

      - name: Build 11ty site
        run: |
          cd content
          npm ci
          npm run build

      - name: Combine artifacts for Pages
        run: |
          # Copy 11ty generated site to .pages
          cp -r content/_site/* .pages/ 2>/dev/null || true
          # Schemas are already in .pages from collect-schemas.js

      - name: Upload Pages artifact
        uses: actions/upload-pages-artifact@7b1f4a764d45c48632c6b24a0339c27f5614fb0b # v4.0.0
        with:
          path: ./.pages

  deploy-pages:
    needs: build-pages
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@cd2ce8fcbc39b97be8ca5fce6e763baed58fa128 # v5.0.0
