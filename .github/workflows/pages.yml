name: Pages

on:
  push:
    branches: ["main"]
    # Only run when content that affects the generated site changes.
    # This avoids a Pages deployment on every push — for example, a mods or
    # znelchar-only commit would otherwise trigger a no-op redeploy.
    # Add paths here whenever a new input to the site build is introduced.
    paths:
      - "content/**"
      - "tools/**/docs/**"
      - "common/scripts/build-pages.js"
      - "common/scripts/collect-schemas.js"
      - "rush.json"
      - ".github/workflows/pages.yml"
  workflow_dispatch:
    # Manual dispatch always runs regardless of path filter — use this for
    # forced re-deployments after infrastructure or schema changes.

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: pages
  cancel-in-progress: true

jobs:
  build-pages:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2

      - uses: actions/setup-node@53b83947a5a98c8d113130e565377fae1a50d02f # v6.3.0
        with:
          node-version: '22.20.0'

      - name: Collect schemas
        # Discovers schemas from all Rush projects via rush.json, validates each
        # schema's $id against the canonical base URL, and writes organized output
        # to .pages/schemas/. Clears and recreates .pages/ for a clean build.
        run: node common/scripts/collect-schemas.js

      - name: Build pages site
        # Uses the Rush build:pages global command so local and CI builds follow
        # the same path. Collects tool documentation from tools/*/docs/ and builds
        # the 11ty site to content/_site/.
        run: node common/scripts/install-run-rush.js build:pages

      - name: Combine artifacts for Pages
        run: |
          # Layer 11ty generated site on top of .pages/ (schemas already written above)
          cp -r content/_site/* .pages/ 2>/dev/null || true

      - name: Upload Pages artifact
        uses: actions/upload-pages-artifact@7b1f4a764d45c48632c6b24a0339c27f5614fb0b # v4.0.0
        with:
          path: ./.pages

  deploy-pages:
    needs: build-pages
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@cd2ce8fcbc39b97be8ca5fce6e763baed58fa128 # v5.0.0
