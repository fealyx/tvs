name: Update Action Pins

on:
  workflow_dispatch:
  schedule:
    - cron: '27 5 * * 1'

permissions:
  contents: write
  pull-requests: write

jobs:
  refresh-pins:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2

      - uses: actions/setup-node@53b83947a5a98c8d113130e565377fae1a50d02f # v6.3.0
        with:
          node-version: '22.20.0'

      - name: Update pinned action SHAs
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: node common/scripts/update-action-pins.js --write

      - name: Create pull request
        uses: peter-evans/create-pull-request@c0f553fe549906ede9cf27b5156039d195d2ece0 # v8.1.0
        with:
          commit-message: 'chore(ci): refresh pinned GitHub Action SHAs'
          title: 'chore(ci): refresh pinned GitHub Action SHAs'
          body: |
            Automated refresh of pinned GitHub Action SHAs.

            - Source: `.github/workflows/*.yml`
            - Method: `common/scripts/update-action-pins.js`
          branch: chore/update-action-pins
          delete-branch: true
          labels: |
            dependencies
            ci
