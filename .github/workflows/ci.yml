name: CI
on:
  push:
    branches: [ "main" ]
  pull_request:
    branches: [ "main" ]
jobs:
  build:
    runs-on: ubuntu-latest
    env:
      CI: true
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
        with:
          fetch-depth: 2

      - uses: actions/setup-node@53b83947a5a98c8d113130e565377fae1a50d02f # v6.3.0
        with:
          node-version: '22.20.0'

      - name: Cache Rush and pnpm state
        uses: actions/cache@668228422ae6a00e4ad889ee87cd7109ec5666a7 # v5.0.4
        with:
          path: |
            common/temp/pnpm-store
            common/temp/pnpm-local
            common/temp/install-run
            common/temp/build-cache
          key: rush-${{ runner.os }}-${{ hashFiles('rush.json', 'common/config/rush/pnpm-lock.yaml', 'common/config/rush/build-cache.json') }}
          restore-keys: |
            rush-${{ runner.os }}-

      - name: Verify Change Logs
        run: node common/scripts/install-run-rush.js change --verify

      - name: Rush Install
        run: node common/scripts/install-run-rush.js install

      - name: Rush Build
        # Mods are built in the dedicated mods-dotnet job because that job handles
        # private TVS managed-assembly fetching and fallback behavior.
        run: node common/scripts/install-run-rush.js build --verbose --to-except @tvs/mods

      - name: Znelchar Update Self-Test Matrix
        # Rush build should generate dist outputs, but when outputs are missing
        # (for example due to cache edge cases) self-test needs a fallback build.
        shell: pwsh
        run: >-
          if (-not (Test-Path -LiteralPath './tools/znelchar/dist/znelchar-release-manifest.json')) {
            Write-Host 'znelchar release manifest missing after Rush build; running explicit dist build.'
            npm --prefix tools/znelchar run build:dist
          }

          npm --prefix tools/znelchar run update:selftest:matrix

  mods-dotnet:
    runs-on: ubuntu-latest
    env:
      CI: true
      TVS_BUILD_DATA_MANIFEST: 0.45.1
      TVS_BUILD_DATA_TOKEN: ${{ secrets.TVS_BUILD_DATA_TOKEN }}
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2

      - uses: actions/setup-dotnet@c2fa09f4bde5ebb9d1777cf28262a3eb3db3ced7 # v5.2.0
        with:
          dotnet-version: |
            8.0.x

      - name: Fetch private TVS managed refs
        if: env.TVS_BUILD_DATA_TOKEN != ''
        shell: pwsh
        run: >-
          pwsh -NoProfile -ExecutionPolicy Bypass -File ./mods/scripts/fetch-tvs-build-data.ps1
          -Manifest $env:TVS_BUILD_DATA_MANIFEST

      - name: Proceed without private TVS managed refs
        if: env.TVS_BUILD_DATA_TOKEN == ''
        run: echo "TVS_BUILD_DATA_TOKEN is not configured; mods CI will use the no-game-refs fallback build path."

      - name: Validate mods asset manifests
        shell: pwsh
        run: pwsh -NoProfile -ExecutionPolicy Bypass -File ./mods/scripts/validate-mod-assets.ps1 -All -CiSummary

      - name: Restore mods solution
        # Always use mods/nuget.config explicitly so CI and local restore resolve
        # package source mappings the same way.
        run: dotnet restore mods/Mods.sln --configfile mods/nuget.config --force-evaluate

      - name: Build mods solution
        run: dotnet build mods/Mods.sln --configuration Release --no-restore
